name: main
on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        # https://devguide.python.org/versions/#supported-versions
        python-version: ['3.9', '3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v3

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: make sync

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Code Coverage
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest' && github.ref != 'refs/heads/main'
        run: make coverage_ci

      - name: Code Coverage Report
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest' && github.ref != 'refs/heads/main'
        uses: romeovs/lcov-reporter-action@2a28ec3e25fb7eae9cb537e9141603486f810d1a # https://github.com/romeovs/lcov-reporter-action/issues/46
        with:
          lcov-file: coverage.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
          delete-old-comments: true

      # - name: Integration Test
      #   if: matrix.os == 'ubuntu-latest'
      #   run: make integration_test
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     PYDEVD_DISABLE_FILE_VALIDATION: 1

      - name: Verify Notebooks
        if: matrix.os == 'ubuntu-latest'
        env:
          PYDEVD_DISABLE_FILE_VALIDATION: 1
        run: make validate_notebooks

      - name: Build
        run: make build

  terraform-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TERRAFORM_DIRECTORY: terraform
    steps:
      - uses: actions/checkout@v3
      - uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        run: terraform init -input=false -backend=false

      - name: Terraform Format
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}
        run: terraform validate

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, terraform-lint]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v5

      - name: Release
        id: release
        uses: go-semantic-release/action@v1
        if: github.ref == 'refs/heads/main'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true

      # Prerelease
      - name: Bump uv (Prerelease)
        id: prerelease
        if: github.ref != 'refs/heads/main' && github.event_name == 'pull_request'
        run: |
          # extract the current version
          CURRENT_VERSION=$(uv version --short)

          # bump the version
          # it's difficult to know if this should be patch, minor, major ahead of time as it would require running the actual release action
          VERSION=$(uv run --with semantic-version python -c "from semantic_version import Version; v = Version('${CURRENT_VERSION}'); v = v.next_patch(); print(v)")

          # add prerelease version identifier
          VERSION="${VERSION}b${{ github.run_number }}" # _${{ github.run_attempt }}"

          uv version "$VERSION" --frozen

          # ensure the published package links back to the pull request
          PULL_REQUEST_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")
          sed -i "s#Repository = .*#Repository = \"https://github.com/kiran94/prfiesta/pull/$PULL_REQUEST_NUMBER\"#" pyproject.toml

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Deploy (Prerelease)
        if: github.ref != 'refs/heads/main' && github.event_name == 'pull_request'
        run: |
          uv build
          uv publish -u __token__ -p $POETRY_PYPI_TOKEN_PYPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.POETRY_PYPI_TOKEN_PYPI }}

      - name: Comment (Prerelease)
        if: github.ref != 'refs/heads/main' && github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Change was prereleased to pypi. Try it out :rocket:

            ```bash
            python -m pip install prfiesta==${{steps.prerelease.outputs.VERSION}}
            ```

            https://pypi.org/project/prfiesta/${{steps.prerelease.outputs.VERSION}}/

          comment_tag: execution

      # Main Release
      - name: Bump Version
        if: github.ref == 'refs/heads/main' && steps.release.outputs.version != ''
        run: uv version "${{ steps.release.outputs.version }}" --no-sync

      - name: Deploy
        if: github.ref == 'refs/heads/main' && steps.release.outputs.version != ''
        run: |
          uv build
          uv publish -u __token__ -p $POETRY_PYPI_TOKEN_PYPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.POETRY_PYPI_TOKEN_PYPI }}

      - uses: EndBug/add-and-commit@v9
        if: github.ref == 'refs/heads/main' && steps.release.outputs.version != ''
        with:
          message: "chore(version): bump"
          default_author: github_actions
          add: pyproject.toml uv.lock
